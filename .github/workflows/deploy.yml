name: Deploy to GitHub Pages

on: 
    push: 
        branches: [main]
    schedule:
        - cron: '0 8 * * *'
    workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout your repository
              uses: actions/checkout@v4
            - name: Install, build, and upload your site
              uses: withastro/action@v3
              with:
                node-version: 20
